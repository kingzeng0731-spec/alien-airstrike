<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星际空袭</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @media (hover: none), (pointer: coarse), (max-height: 560px) {
      .overlay {
        padding-bottom: max(112px, env(safe-area-inset-bottom));
      }

      .dialog {
        padding-bottom: max(104px, env(safe-area-inset-bottom));
      }

      .overlay:not(.hidden) .actions {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 180px));
        justify-content: center;
        padding: 8px;
        border: 1px solid rgba(154, 185, 255, 0.3);
        border-radius: 8px;
        background: rgba(8, 16, 30, 0.94);
        box-shadow: 0 -12px 36px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(14px);
      }

      .overlay:not(.hidden) .actions button {
        min-height: 46px;
        font-weight: 800;
      }
    }

    @media (max-height: 560px) {
      .game {
        padding: 0;
      }

      .stage {
        width: 100vw;
        height: 100dvh;
        min-height: 0;
        border: 0;
        border-radius: 0;
      }

      .overlay {
        place-items: start center;
        padding:
          max(8px, env(safe-area-inset-top))
          8px
          max(106px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="星际空袭游戏">
    <section class="stage">
      <canvas id="game" width="1040" height="760" aria-label="游戏画布"></canvas>

      <div class="hud" aria-live="polite">
        <div class="stat score-stat">
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
          <div class="hud-timer" id="timer">0:00</div>
        </div>
      </div>
      <div class="wave-notice" id="waveNotice">第 1 波</div>

      <div class="touch-controls" aria-hidden="false">
        <div class="pad">
          <button class="up" data-hold="up" title="上">▲</button>
          <button class="left" data-hold="left" title="左">◀</button>
          <button class="down" data-hold="down" title="下">▼</button>
          <button class="right" data-hold="right" title="右">▶</button>
        </div>
        <button class="pause" data-action="pause" title="暂停" aria-label="暂停">II</button>
        <button class="fire" data-hold="fire" title="射击" aria-label="射击">◆</button>
        <button class="bomb" data-action="bomb" title="炸弹" aria-label="炸弹">✹</button>
      </div>

      <div class="overlay" id="overlay">
        <div class="dialog">
          <h1 id="title">星际空袭</h1>
          <p id="message">方向键或 WASD 移动。可选择不限时，或输入自定义限时时间。</p>
          <div class="settings" id="settings">
            <div class="rules">
              <div class="rules-block">
                <div class="rules-title">操作</div>
                <p>手机滑动屏幕移动，开火键射击，炸弹键清弹救命，暂停键可中断战斗。电脑用 WASD/方向键移动，空格射击，X 放炸弹，P 暂停。</p>
              </div>
              <div class="rules-block">
                <div class="rules-title">战斗</div>
                <p>飞机中心的小亮点才是受击判定。子弹擦身而过会加分并回能量；红条是生命，蓝条是护盾，青条是能量或火力进度。</p>
              </div>
              <div class="rules-block">
                <div class="rules-title">成长</div>
                <p>击落敌机会掉落能量、生命、炸弹和升级道具。普通模式每 3 波出现 BOSS，限时模式节奏更快，击破后从三张技能卡里选一张强化。</p>
              </div>
            </div>
            <div class="setting">
              <div class="setting-name">玩法</div>
              <div class="choice-row two">
                <button class="choice" data-option="mode" data-value="energy" aria-pressed="true">能量射击</button>
                <button class="choice" data-option="mode" data-value="auto" aria-pressed="false">自动升级</button>
              </div>
            </div>
            <div class="setting">
              <div class="setting-name">时间</div>
              <div class="choice-row two">
                <button class="choice" data-option="timed" data-value="false" aria-pressed="true">不限时</button>
                <button class="choice" data-option="timed" data-value="true" aria-pressed="false">自定义限时</button>
              </div>
              <label class="time-input-row" for="timeLimit">
                <span>限时秒数</span>
                <input id="timeLimit" type="number" inputmode="numeric" min="10" max="3600" step="10" value="90">
                <span>秒</span>
              </label>
              <div class="time-hint">
                可输入 10 到 3600 秒。
              </div>
            </div>
            <div class="setting">
              <div class="setting-name">难度</div>
              <div class="choice-row">
                <button class="choice" data-option="difficulty" data-value="easy" aria-pressed="false">简单</button>
                <button class="choice" data-option="difficulty" data-value="normal" aria-pressed="true">普通</button>
                <button class="choice" data-option="difficulty" data-value="hard" aria-pressed="false">困难</button>
              </div>
            </div>
          </div>
          <div class="actions">
            <button id="start">开始游戏</button>
            <button id="mute">音效：开</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
